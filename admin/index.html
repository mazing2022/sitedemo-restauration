<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | TONRESTAURANT</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="admin-login-page">
  <main class="login-shell">
    <section class="login-card">
      <p class="login-kicker">PANEL ADMIN</p>
      <h1>TONRESTAURANT</h1>
      <p class="login-text">Connectez-vous pour gérer la carte, les infos et les statistiques du site.</p>

      <form id="admin-login-form" novalidate>
        <label for="admin-email">Email</label>
        <input id="admin-email" name="email" type="email" autocomplete="email" required>

        <label for="admin-password">Mot de passe</label>
        <input id="admin-password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit" class="admin-btn primary">Se connecter</button>
        <p id="login-feedback" class="feedback" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
